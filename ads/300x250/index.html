<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=300,height=250">
<title>BetterMingle - 300x250</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden}
.banner{width:300px;height:250px;background:#F8F7FC;position:relative;cursor:pointer;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;border:1px solid #e0dfe6}
.bg-accent{position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,rgba(91,95,239,0.08),rgba(232,121,184,0.1))}
.bg-accent2{position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,rgba(232,121,184,0.08),rgba(91,95,239,0.06))}
.content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100%;padding:22px 20px 20px}
.logo-area{display:flex;align-items:center;gap:8px;opacity:0;animation:fadeIn 0.5s ease-out forwards}
.logo-svg{width:40px;height:36px}
.logo-text{font-size:15px;font-weight:700;color:#1A1B3D;letter-spacing:-0.3px}
.headline{font-size:22px;font-weight:700;color:#1A1B3D;text-align:center;line-height:1.2;opacity:0;animation:slideUp 0.6s ease-out 0.5s forwards}
.features{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeIn 0.5s ease-out 1.2s forwards}
.feature{background:#F5EDE4;color:#1A1B3D;font-size:11px;font-weight:600;padding:4px 10px;border-radius:12px}
.cta{background:#5B5FEF;color:#fff;border:none;padding:10px 28px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;opacity:0;animation:popIn 0.4s ease-out 1.8s forwards;letter-spacing:0.2px}
.cta:hover{background:#4a4edb;transform:scale(1.04)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="banner" onclick="window.open(clickTag)">
<div class="bg-accent"></div>
<div class="bg-accent2"></div>
<div class="content">
<div class="logo-area">
<svg class="logo-svg" viewBox="0 0 50 45" fill="none" xmlns="http://www.w3.org/2000/svg">
<text x="0" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="none" stroke="#1A1B3D" stroke-width="3" stroke-linejoin="round">B</text>
<text x="0" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="#5B5FEF">B</text>
<text x="24" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="none" stroke="#1A1B3D" stroke-width="3" stroke-linejoin="round">M</text>
<text x="24" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="#E8795F">M</text>
</svg>
<span class="logo-text">BetterMingle</span>
</div>
<div class="headline">Plan less,<br>mingle better</div>
<div class="features">
<span class="feature">Vote</span>
<span class="feature">Split costs</span>
<span class="feature">Chat</span>
<span class="feature">Plan</span>
</div>
<button class="cta">Stáhni zdarma</button>
</div>
</div>
<script>
var clickTag = "https://play.google.com/store/apps/details?id=com.bettermingle.app";
</script>
</body>
</html>
