<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=320,height=100">
<title>BetterMingle - 320x100</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden}
.banner{width:320px;height:100px;background:#F8F7FC;position:relative;cursor:pointer;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;border:1px solid #e0dfe6;display:flex;align-items:center}
.bg-accent{position:absolute;top:-30px;right:-20px;width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(91,95,239,0.06),rgba(232,121,184,0.08))}
.content{position:relative;z-index:1;display:flex;align-items:center;width:100%;padding:0 16px;gap:14px}
.left{display:flex;flex-direction:column;gap:4px;flex:1}
.logo-area{display:flex;align-items:center;gap:6px;opacity:0;animation:fadeIn 0.4s ease-out forwards}
.logo-svg{width:28px;height:26px}
.logo-text{font-size:12px;font-weight:700;color:#1A1B3D;letter-spacing:-0.2px}
.headline{font-size:16px;font-weight:700;color:#1A1B3D;line-height:1.2;opacity:0;animation:slideRight 0.5s ease-out 0.3s forwards}
.tagline{font-size:11px;color:#6B6D8A;opacity:0;animation:fadeIn 0.4s ease-out 0.7s forwards}
.right{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.cta{background:#5B5FEF;color:#fff;border:none;padding:9px 20px;border-radius:18px;font-size:13px;font-weight:700;cursor:pointer;opacity:0;animation:popIn 0.4s ease-out 1s forwards;white-space:nowrap;letter-spacing:0.2px}
.cta:hover{background:#4a4edb;transform:scale(1.04)}
.features{display:flex;gap:4px;opacity:0;animation:fadeIn 0.4s ease-out 1.3s forwards}
.feature{font-size:9px;color:#6B6D8A;font-weight:600}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="banner" onclick="window.open(clickTag)">
<div class="bg-accent"></div>
<div class="content">
<div class="left">
<div class="logo-area">
<svg class="logo-svg" viewBox="0 0 50 45" fill="none" xmlns="http://www.w3.org/2000/svg">
<text x="0" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="none" stroke="#1A1B3D" stroke-width="3" stroke-linejoin="round">B</text>
<text x="0" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="#5B5FEF">B</text>
<text x="24" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="none" stroke="#1A1B3D" stroke-width="3" stroke-linejoin="round">M</text>
<text x="24" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="#E8795F">M</text>
</svg>
<span class="logo-text">BetterMingle</span>
</div>
<div class="headline">Plan less, mingle better</div>
<div class="tagline">Your group plans, simplified</div>
</div>
<div class="right">
<button class="cta">Stáhni zdarma</button>
<div class="features">
<span class="feature">Vote</span>
<span class="feature">·</span>
<span class="feature">Split</span>
<span class="feature">·</span>
<span class="feature">Chat</span>
<span class="feature">·</span>
<span class="feature">Plan</span>
</div>
</div>
</div>
</div>
<script>
var clickTag = "https://play.google.com/store/apps/details?id=com.bettermingle.app";
</script>
</body>
</html>
