<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=320,height=50">
<title>BetterMingle - 320x50</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden}
.banner{width:320px;height:50px;background:#F8F7FC;position:relative;cursor:pointer;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;border:1px solid #e0dfe6;display:flex;align-items:center}
.content{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 12px;gap:10px}
.logo-area{display:flex;align-items:center;gap:5px;flex-shrink:0;opacity:0;animation:fadeIn 0.4s ease-out forwards}
.logo-svg{width:26px;height:24px}
.logo-text{font-size:11px;font-weight:700;color:#1A1B3D;letter-spacing:-0.2px}
.headline{font-size:13px;font-weight:700;color:#1A1B3D;white-space:nowrap;opacity:0;animation:slideRight 0.5s ease-out 0.3s forwards}
.cta{background:#5B5FEF;color:#fff;border:none;padding:7px 14px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;opacity:0;animation:popIn 0.4s ease-out 0.8s forwards;white-space:nowrap}
.cta:hover{background:#4a4edb}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="banner" onclick="window.open(clickTag)">
<div class="content">
<div class="logo-area">
<svg class="logo-svg" viewBox="0 0 50 45" fill="none" xmlns="http://www.w3.org/2000/svg">
<text x="0" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="none" stroke="#1A1B3D" stroke-width="3" stroke-linejoin="round">B</text>
<text x="0" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="#5B5FEF">B</text>
<text x="24" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="none" stroke="#1A1B3D" stroke-width="3" stroke-linejoin="round">M</text>
<text x="24" y="38" font-family="'Segoe UI',sans-serif" font-weight="900" font-size="42" fill="#E8795F">M</text>
</svg>
<span class="logo-text">BetterMingle</span>
</div>
<div class="headline">Plan less, mingle better</div>
<button class="cta">Stáhni zdarma</button>
</div>
</div>
<script>
var clickTag = "https://play.google.com/store/apps/details?id=com.bettermingle.app";
</script>
</body>
</html>
